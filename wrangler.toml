name = "influenceroom"
# worker-entry.mjs wraps .open-next/worker.js and adds a scheduled() handler
# so cron triggers can drive /api/cron/process-queue. fetch is delegated 1:1.
main = "worker-entry.mjs"
compatibility_date = "2025-09-23"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[triggers]
# Drains notifications.status='queued' every 5 min via processQueueBatch({limit:50}).
# Auto-flush on /api/admin/broadcast still handles broadcasts instantly via
# ctx.waitUntil; this cron catches the other 5 notification types
# (task_assigned, task_status_changed, deadline_reminder, daily_digest,
# campaign_started) which enqueue without an explicit flush call.
crons = ["*/5 * * * *"]
